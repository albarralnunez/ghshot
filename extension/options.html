<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ghshot options</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 560px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1f2328;
      }
      h1 {
        font-size: 1.3rem;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 1rem 0 0.25rem;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 0.5rem;
        font-size: 0.95rem;
        border: 1px solid #d0d7de;
        border-radius: 6px;
      }
      .hint {
        color: #57606a;
        font-size: 0.8rem;
        margin-top: 0.25rem;
      }
      .row {
        margin-top: 1.5rem;
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 0.95rem;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        background: #f6f8fa;
        cursor: pointer;
      }
      button.primary {
        background: #1f883d;
        color: #fff;
        border-color: #1f883d;
      }
      #status {
        margin-top: 1rem;
        font-size: 0.9rem;
        min-height: 1.2em;
      }
      .ok {
        color: #1a7f37;
      }
      .err {
        color: #cf222e;
      }
    </style>
  </head>
  <body>
    <h1>ghshot</h1>
    <p class="hint">
      Uploads images to GitHub user-attachments using your existing github.com
      login. Point this at your local ghshot bridge.
    </p>

    <label for="bridgeUrl">Bridge URL</label>
    <input id="bridgeUrl" type="text" placeholder="http://127.0.0.1:41330" />
    <div class="hint">Default: http://127.0.0.1:41330</div>

    <label for="token">Token</label>
    <input id="token" type="text" autocomplete="off" placeholder="paste the bridge token" />
    <div class="hint">
      From <code>~/.config/ghshot/bridge-token</code> or the
      <code>GHSHOT_BRIDGE_TOKEN</code> env var. Run
      <code>bridge/ghshot-bridge --print-token</code> to display it.
    </div>

    <div class="row">
      <button id="save" class="primary">Save</button>
      <button id="test">Test connection</button>
    </div>

    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
