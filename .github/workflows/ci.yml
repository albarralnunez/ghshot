name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: shell (shellcheck + shfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          shellcheck --version
          shellcheck skills/ghshot/ghshot.sh tests/stubs/gh tests/stubs/aws

      - name: shfmt -d -i 2 -ci
        run: |
          SHFMT_VERSION=v3.8.0
          curl -fsSL -o /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          chmod +x /usr/local/bin/shfmt
          shfmt --version
          shfmt -d -i 2 -ci skills/ghshot/ghshot.sh

  bridge:
    name: bridge (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: python3 version
        run: python3 --version

      - name: py_compile
        run: python3 -m py_compile bridge/ghshot-bridge

      - name: ast syntax check
        run: python3 -c "import ast,sys; ast.parse(open('bridge/ghshot-bridge').read()); print('bridge parses OK')"

  test:
    name: bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: npm install -g bats

      - name: bats --version
        run: bats --version

      - name: Run tests
        run: bats tests/
