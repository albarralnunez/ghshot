name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: shell (shellcheck + shfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: shellcheck
        run: |
          shellcheck --version
          shellcheck skills/ghshot/ghshot.sh tests/stubs/gh tests/stubs/curl

      - name: shfmt -d -i 2 -ci
        run: |
          SHFMT_VERSION=v3.8.0
          SHFMT_SHA256=27b3c6f9d9592fc5b4856c341d1ff2c88856709b9e76469313642a1d7b558fe0
          curl -fsSL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          echo "${SHFMT_SHA256}  /tmp/shfmt" | sha256sum -c -
          install -m 0755 /tmp/shfmt /usr/local/bin/shfmt
          shfmt --version
          shfmt -d -i 2 -ci skills/ghshot/ghshot.sh

  bridge:
    name: bridge (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: python3 version
        run: python3 --version

      - name: py_compile
        run: python3 -m py_compile bridge/ghshot-bridge

      - name: ast syntax check
        run: python3 -c "import ast,sys; ast.parse(open('bridge/ghshot-bridge').read()); print('bridge parses OK')"

  test:
    name: bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install bats
        run: |
          BATS_VERSION=v1.13.0
          BATS_SHA=3bca150ec86275d6d9d5a4fd7d48ab8b6c6f3d87
          git clone --depth 1 --branch "$BATS_VERSION" \
            https://github.com/bats-core/bats-core.git "$RUNNER_TEMP/bats"
          got="$(git -C "$RUNNER_TEMP/bats" rev-parse HEAD)"
          if [ "$got" != "$BATS_SHA" ]; then
            echo "bats-core $BATS_VERSION HEAD $got != expected $BATS_SHA" >&2
            exit 1
          fi
          sudo "$RUNNER_TEMP/bats/install.sh" /usr/local

      - name: bats --version
        run: bats --version

      - name: Run tests
        run: bats tests/
